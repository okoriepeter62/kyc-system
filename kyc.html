<!DOCTYPE html>
<html>
<head>
<title>KYC Verification</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
box-sizing:border-box;
font-family:Segoe UI;
}

body{
background:#f4f6f8;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{
background:#fff;
width:100%;
max-width:500px;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:25px;
}

input, select{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

input[type="file"]{
background:#f9f9f9;
}

button{
width:100%;
padding:12px;
background:#007bff;
border:none;
color:white;
font-size:15px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.success{
color:green;
text-align:center;
margin-bottom:15px;
}
</style>

</head>

<body>

<div class="card">

<h2>KYC Verification</h2>

<p id="message"></p>

<form onsubmit="return submitKYC()">

<input type="text" placeholder="Full Name" required>

<input type="date" required>

<select required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<input type="text" placeholder="Nationality" required>

<input type="email" placeholder="Email" required>

<input type="tel" placeholder="Phone Number" required>

<input type="text" placeholder="Residential Address" required>

<select required>
<option value="">Select ID Type</option>
<option>National ID</option>
<option>Driver License</option>
<option>International Passport</option>
</select>

<input type="text" placeholder="ID Number" required>

<label><strong>Upload ID Front</strong></label>
<input type="file" accept="image/*" required>

<label><strong>Upload ID Back</strong></label>
<input type="file" accept="image/*" required>

<br>

<button type="submit">Submit KYC</button>

</form>

</div>

<script>

function submitKYC(){

document.getElementById("message").innerHTML =
"<span class='success'>Demo Mode: KYC submitted successfully. Admin review pending.</span>";

return false;

}

</script>

</body>
</html>
